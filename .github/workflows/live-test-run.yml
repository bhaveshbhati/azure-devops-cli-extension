name: Live Test Run

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build_publish_azure_cli_test_sdk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: Install setuptools
      run: pip install setuptools==70.0.0
      shell: bash

    - name: Setup CI Machine
      uses: ./.github/actions/setup-ci-machine

    - name: Build and Publish Azure CLI Test SDK
      uses: ./.github/actions/build-publish-azure-cli-test-sdk

  build_publish_azure_devops_cli_extension:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: Install setuptools
      run: pip install setuptools==70.0.0
      shell: bash

    - name: Setup CI Machine
      uses: ./.github/actions/setup-ci-machine

    - name: Build and Publish Azure DevOps CLI Extension
      uses: ./.github/actions/build-publish-azure-devops-cli-extension

  run_test_ubuntu:
    needs: [build_publish_azure_cli_test_sdk, build_publish_azure_devops_cli_extension]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'

    - name: Install Azure CLI Edge
      uses: ./.github/actions/install-azure-cli-edge

    - name: Download and Install Local Azure Test SDK
      uses: ./.github/actions/download-install-local-azure-test-sdk

    - name: Setup CI Machine
      uses: ./.github/actions/setup-ci-machine

    - name: Download and Install Local Azure DevOps CLI Extension
      uses: ./.github/actions/download-install-local-azure-devops-cli-extension

    - name: Prepare Live Recording Tests Run
      run: python scripts/prepareLiveRecordingTestsRun.py
      env:
        AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
        AZURE_DEVOPS_EXT_TEST_ORG: ${{ secrets.AZURE_DEVOPS_EXT_TEST_ORG }}
      shell: bash

    - name: Run Live Tests
      run: pytest tests --junitxml "TEST-results.xml"
      env:
        AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
        AZURE_DEVOPS_EXT_TEST_ORG: ${{ secrets.AZURE_DEVOPS_EXT_TEST_ORG }}
      shell: bash